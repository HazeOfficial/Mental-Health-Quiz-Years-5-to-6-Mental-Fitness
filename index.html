<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Dedicated Video Quiz</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f0f2f5;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }
    .container {
      max-width: 700px;
      width: 100%;
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      text-align: center;
    }
    video {
      width: 100%;
      border-radius: 5px;
      background: #000;
    }
    #quiz-box {
      display: none;
      margin-top: 20px;
      padding: 15px;
      background: #eef2ff;
      border: 2px solid #4f46e5;
      border-radius: 8px;
    }
    button {
      background-color: #4f46e5;
      color: white;
      border: none;
      padding: 10px 20px;
      margin: 5px;
      border-radius: 5px;
      cursor: pointer;
      font-size: 16px;
    }
    button:hover {
      background-color: #4338ca;
    }
    #feedback {
      margin-top: 10px;
      font-weight: bold;
    }
  </style>
</head>
<body>

<div class="container">
  <h2>Watch the video and answer the questions!</h2>

  <div id="video-wrapper">
    <!-- CRITICAL: Change quiz-video.mp4 to match your exact file name -->
    <video id="quiz-video" controls>
      <source src="downlodawdwaad" type="video/mp4">
      Your browser does not support the video tag.
    </video>
  </div>

  <div id="quiz-box">
    <h3 id="question-text">Loading question...</h3>
    <div id="options-container"></div>
    <p id="feedback"></p>
  </div>
</div>

<script>
  const quizVideo = document.getElementById('quiz-video');
  const quizBox = document.getElementById('quiz-box');
  const questionText = document.getElementById('question-text');
  const optionsContainer = document.getElementById('options-container');
  const feedback = document.getElementById('feedback');

  let questionAsked = false;

  // Watch video playback time
  quizVideo.addEventListener('timeupdate', function() {
    // Pauses at exactly 5 seconds. You can change this number!
    if (Math.floor(quizVideo.currentTime) === 5 && !questionAsked) {
      quizVideo.pause();
      questionAsked = true;
      showQuestion();
    }
  });

  // Your question data
  const quizData = {
    question: "The video is paused! What is 2 + 2?",
    options: ["3", "4", "5"],
    correct: "4"
  };

  function showQuestion() {
    quizBox.style.display = 'block';
    questionText.textContent = quizData.quizData || quizData.question;
    optionsContainer.innerHTML = '';
    feedback.textContent = '';

    quizData.options.forEach(option => {
      const btn = document.createElement('button');
      btn.textContent = option;
      btn.onclick = function() { checkAnswer(option); };
      optionsContainer.appendChild(btn);
    });
  }

  function checkAnswer(selectedOption) {
    if (selectedOption === quizData.correct) {
      feedback.style.color = 'green';
      feedback.textContent = 'Correct! Resuming video...';
      
      setTimeout(() => {
        quizBox.style.display = 'none';
        quizVideo.play();
      }, 1500);
    } else {
      feedback.style.color = 'red';
      feedback.textContent = 'Wrong answer! Try again.';
    }
  }
</script>

</body>
</html>
